version: '3.9'

services:
  # ─── BR10ACS API ──────────────────────────────────────────────────────────
  br10acs-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: br10acs-api
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/br10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GENIEACS_NBI_URL: ${GENIEACS_NBI_URL:-http://genieacs-nbi:7557}
      GENIEACS_CWMP_URL: ${GENIEACS_CWMP_URL:-http://genieacs-cwmp:7547}
      JWT_SECRET: ${JWT_SECRET:-br10acs_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-br10acs_refresh_secret_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-br10acs_enc_key_32chars_change_me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
    volumes:
      - br10acs_data:/app/data
    depends_on:
      - mongodb
      - redis
    networks:
      - br10acs_net
      - genieacs_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/settings/public"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MongoDB (banco br10 — separado do genieacs) ──────────────────────────
  # Se já tiver MongoDB rodando com o GenieACS, remova este serviço
  # e aponte MONGODB_URI para o MongoDB existente
  mongodb:
    image: mongo:7
    container_name: br10acs-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - br10acs_mongodb:/data/db
    networks:
      - br10acs_net
    command: mongod --quiet

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: br10acs-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - br10acs_redis:/data
    networks:
      - br10acs_net
    command: redis-server --appendonly yes

volumes:
  br10acs_data:
  br10acs_mongodb:
  br10acs_redis:

networks:
  br10acs_net:
    driver: bridge
  genieacs_net:
    external: true
    name: ${GENIEACS_NETWORK:-genieacs_default}
