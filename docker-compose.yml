# =============================================================================
# BR10ACS — docker-compose.yml (Servidor Completo — Instalação do Zero)
#
# Serviços incluídos em uma única rede Docker (br10acs_net):
#   MongoDB 7.x  (fallback para 4.4 em CPUs sem AVX — defina MONGO_IMAGE=mongo:4.4 no .env)
#   Redis 7
#   GenieACS     (CWMP :7547 | NBI :7557 | FS :7567 | UI :3000 — tudo em um container)
#   BR10ACS API  (porta API_PORT, padrão 8080)
#
# Uso rápido:
#   sudo ./instalar.sh          # recomendado — detecta AVX, gera senhas, sobe tudo
#   — ou —
#   cp .env.example .env && nano .env
#   docker compose up -d --build
# =============================================================================

services:

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  # CPUs sem AVX (VMs antigas, Proxmox, KVM sem AVX): defina MONGO_IMAGE=mongo:4.4 no .env
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: br10acs-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: genieacs
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - br10acs_net
    healthcheck:
      # Compatível com mongo:4.4 (usa 'mongo') e mongo:7 (usa 'mongosh')
      # O '|| exit 0' garante que o container não fique preso se nenhum cliente estiver disponível
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" 2>/dev/null || mongo --quiet --eval \"db.adminCommand('ping').ok\" 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: br10acs-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - br10acs_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── GenieACS (CWMP + NBI + FS + UI em um único container) ───────────────────
  # A imagem drumsergio/genieacs roda todos os serviços GenieACS internamente.
  # Não use 'command' para separar serviços — a imagem já gerencia isso.
  genieacs:
    image: drumsergio/genieacs:latest
    container_name: br10acs-genieacs
    restart: unless-stopped
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/genieacs?authSource=admin
      GENIEACS_UI_JWT_SECRET: ${JWT_SECRET:-br10acs_genieacs_jwt_change_me}
      GENIEACS_EXT_DIR: /opt/genieacs/ext
      GENIEACS_CWMP_ACCESS_LOG_FILE: /var/log/genieacs/genieacs-cwmp-access.log
      GENIEACS_NBI_ACCESS_LOG_FILE: /var/log/genieacs/genieacs-nbi-access.log
      GENIEACS_FS_ACCESS_LOG_FILE: /var/log/genieacs/genieacs-fs-access.log
      GENIEACS_UI_ACCESS_LOG_FILE: /var/log/genieacs/genieacs-ui-access.log
      GENIEACS_DEBUG_FILE: /var/log/genieacs/genieacs-debug.yaml
    ports:
      - "${CWMP_PORT:-7547}:7547"
      - "127.0.0.1:7557:7557"
      - "127.0.0.1:7567:7567"
      - "127.0.0.1:3000:3000"
    volumes:
      - genieacs_ext:/opt/genieacs/ext
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - br10acs_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── BR10ACS API ──────────────────────────────────────────────────────────────
  br10acs-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: br10acs-api:latest
    container_name: br10acs-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:3000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-America/Sao_Paulo}
      # MongoDB — banco br10 separado do banco genieacs
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/br10?authSource=admin
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # GenieACS (via rede interna — nunca exposto externamente)
      GENIEACS_NBI_URL: http://genieacs:7557
      GENIEACS_CWMP_URL: http://genieacs:7547
    volumes:
      - br10acs_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      genieacs:
        condition: service_started
    networks:
      - br10acs_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# =============================================================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  genieacs_ext:
    driver: local
  br10acs_data:
    driver: local

networks:
  br10acs_net:
    driver: bridge
    name: br10acs_net
